name: Scope APK engine PR

on:
  push:
    branches: [agent/course-engine-rebuild]

permissions:
  contents: write

jobs:
  scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/course-engine-rebuild
          fetch-depth: 0

      - name: Restore course business data and publishing workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git restore --source=origin/master --staged --worktree \
            .github/workflows/course-release.yml \
            tools/course-content
          rm -f .github/workflows/scope-apk-engine-pr.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: separate APK engine from course publishing"

      - name: Upload final file blobs
        shell: bash
        env:
          TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          token = os.environ['TOKEN']
          repository = os.environ['REPOSITORY']
          api = f'https://api.github.com/repos/{repository}'

          def request(method, path, payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(api + path, data=data, method=method, headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f'Bearer {token}',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              })
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          parent = subprocess.check_output(['git', 'rev-parse', 'HEAD^'], text=True).strip()
          base_tree = subprocess.check_output(['git', 'show', '-s', '--format=%T', 'HEAD^'], text=True).strip()
          modified = subprocess.check_output(
              ['git', 'diff', '--name-only', '--diff-filter=AM', 'HEAD^', 'HEAD'], text=True
          ).splitlines()
          deleted = subprocess.check_output(
              ['git', 'diff', '--name-only', '--diff-filter=D', 'HEAD^', 'HEAD'], text=True
          ).splitlines()

          entries = []
          for path in modified:
              raw = open(path, 'rb').read()
              blob = request('POST', '/git/blobs', {
                  'content': base64.b64encode(raw).decode(),
                  'encoding': 'base64',
              })
              mode = subprocess.check_output(['git', 'ls-tree', 'HEAD', '--', path], text=True).split()[0]
              entries.append({'path': path, 'mode': mode, 'type': 'blob', 'sha': blob['sha']})
          for path in deleted:
              entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})

          with open('apk-engine-scope-tree.json', 'w', encoding='utf-8') as handle:
              json.dump({'parent': parent, 'baseTree': base_tree, 'entries': entries}, handle, ensure_ascii=False, indent=2)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: apk-engine-scope-tree
          path: apk-engine-scope-tree.json
          compression-level: 0
