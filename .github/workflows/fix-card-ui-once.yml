name: One-time card UI source fix

on:
  push:
    branches: ["feat/card-motion-ui"]

permissions:
  contents: write

jobs:
  fix-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct ColumnScope receiver and remove workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/com/majortomman/school/ui/PersistentScreens.kt")
          content = path.read_text(encoding="utf-8")
          content = content.replace(
              "import androidx.compose.foundation.layout.Column\n",
              "import androidx.compose.foundation.layout.Column\nimport androidx.compose.foundation.layout.ColumnScope\n",
              1,
          )
          content = content.replace(
              "private fun LearningCardColumn(content: @Composable Column.() -> Unit)",
              "private fun LearningCardColumn(content: @Composable ColumnScope.() -> Unit)",
          )
          path.write_text(content, encoding="utf-8")
          PY
          rm .github/workflows/fix-card-ui-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/majortomman/school/ui/PersistentScreens.kt .github/workflows/fix-card-ui-once.yml
          git commit -m "fix: use ColumnScope for animated learning cards"
          git push
