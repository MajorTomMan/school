name: Fix PDF reader actions once

on:
  push:
    branches: ["feat/material-pack-v1"]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/material-pack-v1
      - name: Patch reader actions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("app/src/main/java/com/majortomman/school/ui/PdfTextbookScreen.kt")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "import androidx.compose.foundation.border\n",
              "import androidx.compose.foundation.border\nimport androidx.compose.foundation.clickable\n",
              1,
          )
          old = '''        modifier = modifier
                      .height(45.dp)
                      .border(1.dp, effective, RoundedCornerShape(9.dp))
                      .background(Color.Transparent, RoundedCornerShape(9.dp))
                      .then(if (enabled) Modifier.padding(vertical = 12.dp) else Modifier.padding(vertical = 12.dp)),'''
          new = '''        modifier = modifier
                      .height(45.dp)
                      .border(1.dp, effective, RoundedCornerShape(9.dp))
                      .clickable(enabled = enabled, onClick = onClick)
                      .padding(vertical = 12.dp),'''
          if old not in text:
              raise SystemExit("ReaderAction modifier not found")
          text = text.replace(old, new, 1)
          old = '''        Text("返回", modifier = Modifier.padding(14.dp), color = ReaderBlue, fontWeight = FontWeight.Bold)'''
          new = '''        Text(
                      "返回",
                      modifier = Modifier.clickable(onClick = onBack).padding(14.dp),
                      color = ReaderBlue,
                      fontWeight = FontWeight.Bold,
                  )'''
          if old not in text:
              raise SystemExit("ReaderError action not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          rm .github/workflows/fix-pdf-reader-actions-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/majortomman/school/ui/PdfTextbookScreen.kt .github/workflows/fix-pdf-reader-actions-once.yml
          git commit -m "修复：启用 PDF 阅读器翻页与返回按钮"
          git push origin HEAD:feat/material-pack-v1
