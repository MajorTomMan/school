name: Course Release

on:
  pull_request:
    paths:
      - "tools/course-content/**"
      - ".github/workflows/course-release.yml"
  push:
    branches:
      - master
    paths:
      - "tools/course-content/**"
      - ".github/workflows/course-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: course-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-course:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install textbook validation dependency
        run: python3 -m pip install --disable-pip-version-check --quiet PyMuPDF

      - name: Download six mathematics textbooks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/course-source
          download_pdf() {
            local file_id="$1"
            local file_name="$2"
            local expected_size="$3"
            local expected_sha="$4"
            local output="build/course-source/$file_name"
            curl --fail --location --retry 3 --retry-delay 2 \
              --output "$output" \
              "https://drive.usercontent.google.com/download?id=${file_id}&export=download&confirm=t"
            test "$(stat -c%s "$output")" = "$expected_size"
            printf '%s  %s\n' "$expected_sha" "$output" | sha256sum --check --strict
          }

          download_pdf "1zPJIoh7Ora3AOMLXfDll8YbAZ8u1v78N" "义务教育教科书·数学七年级上册.pdf" "12915486" "11b6f1fbfa46eee4158953ef745ae1e6fbe6b9527a1423d55cbe75729e8210b9"
          download_pdf "15pn2jQjlWO6g4SCK5w2ys3SO8aTE-Kjh" "义务教育教科书·数学七年级下册.pdf" "29820133" "a58d058dd4f6a0855558a90a24640d9cf3ff8430112fb4d1f434bd881f836210"
          download_pdf "1spnH7HoU9wSX_J3HqdClU8an4wsWNTB6" "义务教育教科书·数学八年级上册.pdf" "10148104" "e21e7094a470f74a5be947e5fa8a9eee57bd6a4deaaaba3dbd09b811590838ed"
          download_pdf "1lJJzJupEt6FThZDB6WMH8AI09W2fT20D" "义务教育教科书·数学八年级下册.pdf" "20284130" "4979e490f518912473519aafc2b7e016aa804741ac7efbaa4156d230d9dc8b3c"
          download_pdf "1ArtD3pcWtIeawWPNSAVudUVk1X0hqWKx" "义务教育教科书·数学九年级上册.pdf" "9609936" "b6d43c0601c07a6a6f68d3be065c863b41529745e739b4496154c90ecbe7140d"
          download_pdf "12p2aGGugc_EvrO-Kqb17MHzMAqXvHTBn" "义务教育教科书·数学九年级下册.pdf" "11303872" "a71d30eb32b0e43737c88ada99a76ae6b5959050dc53c491b5206bae2d31b0ce"

      - name: Regenerate course sources from textbook text
        run: |
          python3 tools/course-content/generate_all_math_courses.py \
            --pdf-dir build/course-source \
            --output-dir tools/course-content
          git diff --exit-code -- tools/course-content

      - name: Validate every textbook citation
        shell: bash
        run: |
          set -euo pipefail
          validate() {
            python3 tools/course-content/validate_course_sources.py \
              --source "tools/course-content/$1/course.json" \
              --pdf "build/course-source/$2" \
              --page-index-offset 7 \
              --expected-page-count "$3"
          }
          validate pep-math-7-1 "义务教育教科书·数学七年级上册.pdf" 202
          validate pep-math-7-2 "义务教育教科书·数学七年级下册.pdf" 202
          validate pep-math-8-1 "义务教育教科书·数学八年级上册.pdf" 182
          validate pep-math-8-2 "义务教育教科书·数学八年级下册.pdf" 206
          validate pep-math-9-1 "义务教育教科书·数学九年级上册.pdf" 163
          validate pep-math-9-2 "义务教育教科书·数学九年级下册.pdf" 122

      - name: Audit complete mathematics course pack
        run: |
          python3 tools/course-content/audit_math_course_pack.py \
            --source-root tools/course-content \
            --pdf-dir build/course-source

      - name: Build combined mathematics release
        run: |
          python3 tools/course-content/build_all_math_course_release.py \
            --registry tools/course-content/math-textbooks.json \
            --source-root tools/course-content \
            --pdf-root build/course-source \
            --output build/course-release/math \
            --textbook-version "${GITHUB_RUN_NUMBER}" \
            --content-version "${GITHUB_RUN_NUMBER}" \
            --minimum-app-version 26 \
            --release-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/course-latest"

      - name: Validate combined release
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import zipfile

          root = Path("build/course-release/math")
          manifest = json.loads((root / "manifest.json").read_text(encoding="utf-8"))
          assert len(manifest["textbooks"]) == 6
          ids = {item["id"] for item in manifest["textbooks"]}
          assert ids == {
              "pep-math-7-1", "pep-math-7-2", "pep-math-8-1",
              "pep-math-8-2", "pep-math-9-1", "pep-math-9-2",
          }
          for textbook in manifest["textbooks"]:
              files = {item["path"]: item for item in textbook["files"]}
              assert files["course.json"]["inFullPackage"] is True
              assert files["assets/textbook.pdf"]["inFullPackage"] is False
              assert files["assets/textbook.pdf"]["url"].startswith("https://drive.google.com/")
              with zipfile.ZipFile(root / f"{textbook['id']}.zip") as archive:
                  assert archive.namelist() == ["course.json"]
          print("six-textbook course release validated")
          PY

      - name: Upload course validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mathematics-course-release
          path: build/course-release/math
          if-no-files-found: warn

      - name: Publish stable course release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view course-latest >/dev/null 2>&1; then
            gh release create course-latest \
              --target "${GITHUB_SHA}" \
              --title "School 课程包" \
              --notes "初中数学六册结构化课程数据。教材 PDF 保留在 Google Drive。" \
              --prerelease
          fi
          gh release upload course-latest build/course-release/math/* --clobber
