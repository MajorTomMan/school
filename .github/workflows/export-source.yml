name: Export source snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: school-source-snapshot
          path: .
          include-hidden-files: true
