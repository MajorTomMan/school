name: Apply course engine refactor

on:
  push:
    branches: [agent/course-engine-rebuild]
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: apply-course-engine-refactor
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/course-engine-rebuild
          fetch-depth: 0

      - name: Verify and apply code patch
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/course-engine-code.patch.b64.part-* > "$RUNNER_TEMP/course-engine-code.patch.b64"
          echo "84486e1284bc52f4d4fdcaa990299b8149787afad3eaf3034081bdcff77dd555  $RUNNER_TEMP/course-engine-code.patch.b64" | sha256sum -c -
          base64 -d "$RUNNER_TEMP/course-engine-code.patch.b64" | gzip -d > "$RUNNER_TEMP/course-engine-code.patch"
          git apply --index "$RUNNER_TEMP/course-engine-code.patch"

      - name: Migrate every course package
        shell: bash
        run: |
          set -euo pipefail
          python3 .automation/migrate_course_packages.py
          python3 tools/course-content/postprocess_math_courses.py --source-root tools/course-content

      - name: Validate the destructive replacement
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile tools/course-content/*.py
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path
          root = Path('tools/course-content')
          sys.path.insert(0, str(root))
          from course_package import validate_course, validate_section
          forbidden = {'schemaVersion', 'contentVersion', 'minimumAppVersion', 'capabilities', 'rendererVersion', 'requiredCapabilities', 'manualReview', 'sourceAnchors'}
          def walk(value, location):
              if isinstance(value, dict):
                  bad = forbidden.intersection(value)
                  if bad:
                      raise SystemExit(f'{location}: forbidden fields: {sorted(bad)}')
                  for key, child in value.items():
                      walk(child, f'{location}.{key}')
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      walk(child, f'{location}[{index}]')
          courses = {}
          for path in sorted(root.glob('pep-math-*/course.json')):
              value = json.loads(path.read_text(encoding='utf-8'))
              validate_course(value)
              walk(value, str(path))
              courses[value['textbook']['id']] = value
          for path in sorted((root / 'manual').glob('**/*.json')):
              value = json.loads(path.read_text(encoding='utf-8'))
              course = courses[path.parent.name]
              validate_section(value, course['textbook']['pdf']['pageCount'], set(), str(path))
              walk(value, str(path))
          if len(courses) != 6:
              raise SystemExit(f'expected 6 courses, found {len(courses)}')
          PY
          git diff --check

      - name: Create clean local commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .automation
          rm -f .github/workflows/apply-course-engine-refactor.yml
          rm -f .github/workflows/export-course-engine-source.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: rebuild course engine"

      - name: Publish immutable Git objects
        id: publish
        continue-on-error: true
        shell: bash
        env:
          TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -o pipefail
          python3 - <<'PY' > publish.log 2>&1
          import base64
          import json
          import os
          import subprocess
          import traceback
          import urllib.error
          import urllib.request

          token = os.environ['TOKEN']
          repository = os.environ['REPOSITORY']
          api = f'https://api.github.com/repos/{repository}'

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(api + path, data=data, method=method, headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f'Bearer {token}',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              })
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.load(response)
              except urllib.error.HTTPError as error:
                  print(f'HTTP {error.code} {method} {path}')
                  print(error.read().decode(errors='replace'))
                  raise

          try:
              parent = subprocess.check_output(['git', 'rev-parse', 'HEAD^'], text=True).strip()
              parent_commit = request('GET', f'/git/commits/{parent}')
              modified = subprocess.check_output(['git', 'diff', '--name-only', '--diff-filter=AM', 'HEAD^', 'HEAD'], text=True).splitlines()
              deleted = subprocess.check_output(['git', 'diff', '--name-only', '--diff-filter=D', 'HEAD^', 'HEAD'], text=True).splitlines()
              tree = []
              for path in modified:
                  raw = open(path, 'rb').read()
                  blob = request('POST', '/git/blobs', {'content': base64.b64encode(raw).decode(), 'encoding': 'base64'})
                  mode = subprocess.check_output(['git', 'ls-tree', 'HEAD', '--', path], text=True).split()[0]
                  tree.append({'path': path, 'mode': mode, 'type': 'blob', 'sha': blob['sha']})
              for path in deleted:
                  tree.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})
              new_tree = request('POST', '/git/trees', {'base_tree': parent_commit['tree']['sha'], 'tree': tree})
              new_commit = request('POST', '/git/commits', {'message': 'refactor: rebuild course engine', 'tree': new_tree['sha'], 'parents': [parent]})
              open('final-commit-sha.txt', 'w').write(new_commit['sha'] + '\n')
              print(new_commit['sha'])
          except Exception:
              traceback.print_exc()
              raise
          PY
          status=$?
          cat publish.log
          exit $status

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: course-engine-object-publication
          path: |
            final-commit-sha.txt
            publish.log
          if-no-files-found: warn
          compression-level: 0

      - name: Require published commit
        if: steps.publish.outcome != 'success'
        run: exit 1
