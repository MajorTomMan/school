name: Apply course engine refactor

on:
  push:
    branches:
      - agent/course-engine-rebuild
  pull_request:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: apply-course-engine-refactor
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/course-engine-rebuild
          fetch-depth: 0

      - name: Verify and apply code patch
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/course-engine-code.patch.b64.part-* > "$RUNNER_TEMP/course-engine-code.patch.b64"
          echo "84486e1284bc52f4d4fdcaa990299b8149787afad3eaf3034081bdcff77dd555  $RUNNER_TEMP/course-engine-code.patch.b64" | sha256sum -c -
          base64 -d "$RUNNER_TEMP/course-engine-code.patch.b64" | gzip -d > "$RUNNER_TEMP/course-engine-code.patch"
          git apply --index "$RUNNER_TEMP/course-engine-code.patch"

      - name: Migrate every course package
        shell: bash
        run: |
          set -euo pipefail
          python3 .automation/migrate_course_packages.py
          python3 tools/course-content/postprocess_math_courses.py --source-root tools/course-content

      - name: Validate the destructive replacement
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile tools/course-content/*.py
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          root = Path('tools/course-content')
          sys.path.insert(0, str(root))
          from course_package import validate_course, validate_section

          forbidden = {
              'schemaVersion', 'contentVersion', 'minimumAppVersion',
              'capabilities', 'rendererVersion', 'requiredCapabilities',
              'manualReview', 'sourceAnchors',
          }

          def walk(value, location):
              if isinstance(value, dict):
                  bad = forbidden.intersection(value)
                  if bad:
                      raise SystemExit(f'{location}: forbidden fields: {sorted(bad)}')
                  for key, child in value.items():
                      walk(child, f'{location}.{key}')
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      walk(child, f'{location}[{index}]')

          courses = {}
          for path in sorted(root.glob('pep-math-*/course.json')):
              value = json.loads(path.read_text(encoding='utf-8'))
              validate_course(value)
              walk(value, str(path))
              courses[value['textbook']['id']] = value
              print('validated', path)

          for path in sorted((root / 'manual').glob('**/*.json')):
              value = json.loads(path.read_text(encoding='utf-8'))
              textbook_id = path.parent.name
              course = courses[textbook_id]
              validate_section(value, course['textbook']['pdf']['pageCount'], set(), str(path))
              walk(value, str(path))
              print('validated', path)

          if len(courses) != 6:
              raise SystemExit(f'expected 6 courses, found {len(courses)}')
          PY
          git diff --check

      - name: Commit final source without migration machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .automation
          rm -f .github/workflows/apply-course-engine-refactor.yml
          rm -f .github/workflows/export-course-engine-source.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: rebuild course engine"
          git push origin HEAD:agent/course-engine-rebuild
