name: Regenerate Mathematics Sources Temp

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: write

concurrency:
  group: regenerate-math-temp-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply generator correction
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/payload/math-generator-fix.b64 > /tmp/math-generator-fix.tar.gz
          printf '%s  %s\n' \
            '05d0814858b7750cd2e99cb56bb8b3ff8b1c0a58f58d51d28bc10c8cc1313324' \
            '/tmp/math-generator-fix.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/math-generator-fix.tar.gz -C .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF parser
        run: python3 -m pip install --disable-pip-version-check --quiet PyMuPDF

      - name: Download six verified textbooks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/course-source
          download_pdf() {
            local id="$1" name="$2" size="$3" sha="$4"
            local output="build/course-source/$name"
            curl --fail --location --retry 3 --retry-delay 2 \
              --output "$output" \
              "https://drive.usercontent.google.com/download?id=${id}&export=download&confirm=t"
            test "$(stat -c%s "$output")" = "$size"
            printf '%s  %s\n' "$sha" "$output" | sha256sum --check --strict
          }
          download_pdf '1zPJIoh7Ora3AOMLXfDll8YbAZ8u1v78N' '义务教育教科书·数学七年级上册.pdf' 12915486 '11b6f1fbfa46eee4158953ef745ae1e6fbe6b9527a1423d55cbe75729e8210b9'
          download_pdf '15pn2jQjlWO6g4SCK5w2ys3SO8aTE-Kjh' '义务教育教科书·数学七年级下册.pdf' 29820133 'a58d058dd4f6a0855558a90a24640d9cf3ff8430112fb4d1f434bd881f836210'
          download_pdf '1spnH7HoU9wSX_J3HqdClU8an4wsWNTB6' '义务教育教科书·数学八年级上册.pdf' 10148104 'e21e7094a470f74a5be947e5fa8a9eee57bd6a4deaaaba3dbd09b811590838ed'
          download_pdf '1lJJzJupEt6FThZDB6WMH8AI09W2fT20D' '义务教育教科书·数学八年级下册.pdf' 20284130 '4979e490f518912473519aafc2b7e016aa804741ac7efbaa4156d230d9dc8b3c'
          download_pdf '1ArtD3pcWtIeawWPNSAVudUVk1X0hqWKx' '义务教育教科书·数学九年级上册.pdf' 9609936 'b6d43c0601c07a6a6f68d3be065c863b41529745e739b4496154c90ecbe7140d'
          download_pdf '12p2aGGugc_EvrO-Kqb17MHzMAqXvHTBn' '义务教育教科书·数学九年级下册.pdf' 11303872 'a71d30eb32b0e43737c88ada99a76ae6b5959050dc53c491b5206bae2d31b0ce'

      - name: Regenerate and audit course sources
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/course-content/generate_all_math_courses.py \
            --pdf-dir build/course-source --output-dir tools/course-content
          python3 tools/course-content/audit_math_course_pack.py \
            --source-root tools/course-content --pdf-dir build/course-source

      - name: Commit generator and generated JSON
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git restore .github/workflows .github/payload
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/course-content/generate_all_math_courses.py \
            tools/course-content/pep-math-7-1/course.json \
            tools/course-content/pep-math-7-2/course.json \
            tools/course-content/pep-math-8-1/course.json \
            tools/course-content/pep-math-8-2/course.json \
            tools/course-content/pep-math-9-1/course.json \
            tools/course-content/pep-math-9-2/course.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m '课程：按章节语义校正数学可视化'
          git push origin "HEAD:${HEAD_BRANCH}"
