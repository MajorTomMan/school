name: Export prebooted API 26 AVD

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3

      - name: Install emulator image
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "emulator" "system-images;android-26;default;x86_64"

      - name: Create and initialize AVD
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"
          echo no | avdmanager create avd \
            -n school_api26_ready \
            -k "system-images;android-26;default;x86_64" \
            --device pixel \
            --force
          sudo chmod 666 /dev/kvm || true
          nohup "$ANDROID_SDK_ROOT/emulator/emulator" -avd school_api26_ready \
            -no-window -no-audio -no-boot-anim -no-metrics \
            -gpu swiftshader_indirect -no-snapshot \
            > "$RUNNER_TEMP/preboot-emulator.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/preboot-emulator.pid"
          timeout 360 bash -c '
            adb wait-for-device
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do
              sleep 2
            done
          '
          adb shell wm size 480x800
          adb shell wm density 240
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell input keyevent 82 || true
          adb shell sync
          adb shell setprop sys.powerctl shutdown || true
          timeout 90 bash -c 'while kill -0 "$(cat "$RUNNER_TEMP/preboot-emulator.pid")" 2>/dev/null; do sleep 2; done' || true
          tail -80 "$RUNNER_TEMP/preboot-emulator.log"

      - name: Package initialized AVD
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export
          tar -C "$HOME/.android" -czf export/prebooted-avd.tar.gz \
            avd/school_api26_ready.ini \
            avd/school_api26_ready.avd
          sha256sum export/prebooted-avd.tar.gz > export/SHA256SUMS
          split -b 240M -d -a 2 export/prebooted-avd.tar.gz export/part-
          ls -lh export

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: prebooted-api26-avd-manifest
          path: export/SHA256SUMS
          compression-level: 0

      - name: Upload part 00
        uses: actions/upload-artifact@v4
        with:
          name: prebooted-api26-avd-part-00
          path: export/part-00
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload part 01
        uses: actions/upload-artifact@v4
        with:
          name: prebooted-api26-avd-part-01
          path: export/part-01
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload part 02
        uses: actions/upload-artifact@v4
        with:
          name: prebooted-api26-avd-part-02
          path: export/part-02
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prebooted-api26-avd-diagnostics
          path: ${{ runner.temp }}/preboot-emulator.log
          if-no-files-found: ignore
