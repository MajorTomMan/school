name: Prepare APK release scope

on:
  push:
    branches: [agent/disable-github-course-release]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/disable-github-course-release
          fetch-depth: 0

      - name: Restore Android workflow with APK-only paths
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git show origin/master:.github/workflows/android.yml > "$RUNNER_TEMP/android.yml"
          python3 - <<'PY'
          from pathlib import Path
          import os

          source = Path(os.environ['RUNNER_TEMP']) / 'android.yml'
          text = source.read_text(encoding='utf-8')
          old = """on:
            push:
              branches: [master]
            pull_request:
          """.replace('          ', '')
          new = """on:
            push:
              branches: [master]
              paths:
                - "app/**"
                - "build.gradle.kts"
                - "settings.gradle.kts"
                - "gradle.properties"
                - "gradlew"
                - "gradlew.bat"
                - "gradle/**"
                - "signing/**"
                - "scripts/send_update_fcm.py"
                - ".release-notes/current.md"
            pull_request:
              paths:
                - "app/**"
                - "build.gradle.kts"
                - "settings.gradle.kts"
                - "gradle.properties"
                - "gradlew"
                - "gradlew.bat"
                - "gradle/**"
                - "signing/**"
                - "scripts/send_update_fcm.py"
                - ".release-notes/current.md"
          """.replace('          ', '')
          if text.count(old) != 1:
              raise SystemExit('Android workflow trigger block did not match exactly')
          Path('.github/workflows/android.yml').write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm -f .github/workflows/course-release.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: separate APK release triggers from course content"

      - name: Upload final file blobs
        shell: bash
        env:
          TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          token = os.environ['TOKEN']
          repository = os.environ['REPOSITORY']
          api = f'https://api.github.com/repos/{repository}'

          def request(method, path, payload):
              data = json.dumps(payload).encode()
              req = urllib.request.Request(api + path, data=data, method=method, headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f'Bearer {token}',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              })
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          parent = subprocess.check_output(['git', 'rev-parse', 'HEAD^'], text=True).strip()
          base_tree = subprocess.check_output(['git', 'show', '-s', '--format=%T', 'HEAD^'], text=True).strip()
          modified = subprocess.check_output(
              ['git', 'diff', '--name-only', '--diff-filter=AM', 'HEAD^', 'HEAD'], text=True
          ).splitlines()
          deleted = subprocess.check_output(
              ['git', 'diff', '--name-only', '--diff-filter=D', 'HEAD^', 'HEAD'], text=True
          ).splitlines()

          entries = []
          for path in modified:
              raw = open(path, 'rb').read()
              blob = request('POST', '/git/blobs', {
                  'content': base64.b64encode(raw).decode(),
                  'encoding': 'base64',
              })
              mode = subprocess.check_output(['git', 'ls-tree', 'HEAD', '--', path], text=True).split()[0]
              entries.append({'path': path, 'mode': mode, 'type': 'blob', 'sha': blob['sha']})
          for path in deleted:
              entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})

          with open('apk-release-scope-tree.json', 'w', encoding='utf-8') as handle:
              json.dump({'parent': parent, 'baseTree': base_tree, 'entries': entries}, handle, ensure_ascii=False, indent=2)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: apk-release-scope-tree
          path: apk-release-scope-tree.json
          compression-level: 0
