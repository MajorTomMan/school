name: Android CI/CD

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Chinese release notes
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          notes_file=".release-notes/current.md"

          python - <<'PY'
          from pathlib import Path
          import re

          path = Path(".release-notes/current.md")
          if not path.is_file():
              raise SystemExit("缺少 .release-notes/current.md")

          text = path.read_text(encoding="utf-8").strip()
          if not text:
              raise SystemExit("中文发布说明不能为空")
          if "## 修改点" not in text or "## 修复点" not in text:
              raise SystemExit("发布说明必须包含“## 修改点”和“## 修复点”")
          if not re.search(r"[\u4e00-\u9fff]", text):
              raise SystemExit("发布说明必须使用中文")
          if not re.search(r"(?m)^- .+", text):
              raise SystemExit("发布说明至少需要一条列表项")
          PY

          if [ -n "${BASE_SHA:-}" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            if ! git diff --name-only "$BASE_SHA" "$GITHUB_SHA" | grep -qx "$notes_file"; then
              echo "每次提交都必须同步更新 $notes_file，并用中文逐条写出修改点和修复点。" >&2
              exit 1
            fi
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_name="0.22.0"
          version_code=$((100000 + GITHUB_RUN_NUMBER))
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "App version: $version_name ($version_code)"

      - name: Verify fixed development signing key
        shell: bash
        run: |
          set -euo pipefail
          source_file="signing/school-development.jks.b64"
          expected_file="signing/school-development.cert.sha256"
          keystore="$RUNNER_TEMP/school-development.jks"

          test -s "$source_file"
          test -s "$expected_file"
          base64 --decode "$source_file" > "$keystore"

          expected="$(tr -d '[:space:]:' < "$expected_file" | tr '[:upper:]' '[:lower:]')"
          actual="$(
            keytool -list -v \
              -keystore "$keystore" \
              -storepass android \
              -alias schooldev \
              | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' \
              | tr -d '[:space:]:' \
              | tr '[:upper:]' '[:lower:]'
          )"

          if [ -z "$actual" ] || [ "$actual" != "$expected" ]; then
            echo "固定开发签名证书指纹不一致：expected=$expected actual=$actual" >&2
            exit 1
          fi

          echo "Fixed development certificate SHA-256: $actual"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Test and assemble debug APK
        id: assemble
        shell: bash
        env:
          SCHOOL_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          SCHOOL_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SCHOOL_FIREBASE_PROJECT_ID: ${{ vars.SCHOOL_FIREBASE_PROJECT_ID }}
          SCHOOL_FIREBASE_APPLICATION_ID: ${{ vars.SCHOOL_FIREBASE_APPLICATION_ID }}
          SCHOOL_FIREBASE_API_KEY: ${{ vars.SCHOOL_FIREBASE_API_KEY }}
          SCHOOL_FIREBASE_SENDER_ID: ${{ vars.SCHOOL_FIREBASE_SENDER_ID }}
          SCHOOL_FIREBASE_UPDATE_TOPIC: ${{ vars.SCHOOL_FIREBASE_UPDATE_TOPIC }}
        run: |
          set +e
          gradle :app:testDebugUnitTest :app:assembleDebug --stacktrace > build.log 2>&1
          status=$?
          tail -n 240 build.log
          exit $status

      - name: Prepare APK, update manifest and signatures
        id: package
        if: success()
        shell: bash
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SCHOOL_UPDATE_PRIVATE_KEY_B64: ${{ secrets.SCHOOL_UPDATE_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/school-debug.apk
          (cd dist && sha256sum school-debug.apk > school-debug.apk.sha256)

          expected="$(tr -d '[:space:]:' < signing/school-development.cert.sha256 | tr '[:upper:]' '[:lower:]')"
          actual="$(
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs dist/school-debug.apk \
              | sed -n 's/^Signer #1 certificate SHA-256 digest:[[:space:]]*//p' \
              | tr -d '[:space:]:' \
              | tr '[:upper:]' '[:lower:]'
          )"

          if [ -z "$actual" ] || [ "$actual" != "$expected" ]; then
            echo "APK 签名证书指纹不一致：expected=$expected actual=$actual" >&2
            exit 1
          fi

          printf '%s  school-debug.apk\n' "$actual" > dist/school-debug.apk.cert-sha256

          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import hashlib
          import json
          import os

          notes = Path('.release-notes/current.md').read_text(encoding='utf-8')
          sections = {'修改点': [], '修复点': []}
          current = None
          for raw in notes.splitlines():
              line = raw.strip()
              if line == '## 修改点':
                  current = '修改点'
              elif line == '## 修复点':
                  current = '修复点'
              elif line.startswith('## '):
                  current = None
              elif current and line.startswith('- '):
                  sections[current].append(line[2:].strip())

          apk = Path('dist/school-debug.apk')
          sha256 = hashlib.sha256(apk.read_bytes()).hexdigest()
          cert = Path('signing/school-development.cert.sha256').read_text().strip().replace(':', '').lower()
          manifest = {
              'schemaVersion': 1,
              'channel': 'development',
              'versionCode': int(os.environ['VERSION_CODE']),
              'versionName': os.environ['VERSION_NAME'],
              'minimumSupportedVersionCode': 0,
              'mandatory': False,
              'publishedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'changes': sections['修改点'],
              'fixes': sections['修复点'],
              'apk': {
                  'fileName': 'school-debug.apk',
                  'downloadUrl': 'https://github.com/MajorTomMan/school/releases/download/dev-latest/school-debug.apk',
                  'size': apk.stat().st_size,
                  'sha256': sha256,
                  'certificateSha256': cert,
              },
          }
          Path('dist/update-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, separators=(',', ':')),
              encoding='utf-8',
          )
          PY

          private_key="$RUNNER_TEMP/school-update-private.pem"
          if [ -n "${SCHOOL_UPDATE_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "$SCHOOL_UPDATE_PRIVATE_KEY_B64" | base64 --decode > "$private_key"
          else
            base64 --decode signing/school-update-development-private.pem.b64 > "$private_key"
          fi
          chmod 600 "$private_key"
          openssl dgst -sha256 -sign "$private_key" -out dist/update-manifest.sig dist/update-manifest.json
          openssl dgst -sha256 -verify signing/school-update-development-public.pem \
            -signature dist/update-manifest.sig dist/update-manifest.json

          echo "APK certificate SHA-256: $actual"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: build.log

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: school-debug-apk
          path: |
            dist/school-debug.apk
            dist/school-debug.apk.sha256
            dist/school-debug.apk.cert-sha256
            dist/update-manifest.json
            dist/update-manifest.sig

      - name: Publish rolling development release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ steps.package.outputs.version_name }}
          SHORT_SHA: ${{ steps.package.outputs.short_sha }}
        run: |
          set -euo pipefail

          tag="dev-latest"
          title="School ${VERSION_NAME} (${SHORT_SHA})"

          cat > release-notes.md <<EOF
          ## 版本

          \`${VERSION_NAME}\`

          EOF
          cat .release-notes/current.md >> release-notes.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag" --force

          assets=(
            dist/school-debug.apk
            dist/school-debug.apk.sha256
            dist/school-debug.apk.cert-sha256
            dist/update-manifest.json
            dist/update-manifest.sig
          )

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
          fi

      - name: Notify installed apps through FCM
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        env:
          SCHOOL_FIREBASE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.SCHOOL_FIREBASE_SERVICE_ACCOUNT_JSON_B64 }}
          SCHOOL_FIREBASE_PROJECT_ID: ${{ vars.SCHOOL_FIREBASE_PROJECT_ID }}
          SCHOOL_FIREBASE_UPDATE_TOPIC: ${{ vars.SCHOOL_FIREBASE_UPDATE_TOPIC }}
          VERSION_CODE: ${{ steps.package.outputs.version_code }}
          VERSION_NAME: ${{ steps.package.outputs.version_name }}
        run: |
          set -euo pipefail
          if [ -z "${SCHOOL_FIREBASE_SERVICE_ACCOUNT_JSON_B64:-}" ] || [ -z "${SCHOOL_FIREBASE_PROJECT_ID:-}" ]; then
            echo "FCM credentials are not configured; release is published and polling remains active."
            exit 0
          fi

          topic="${SCHOOL_FIREBASE_UPDATE_TOPIC:-school_dev_update}"
          service_account="$RUNNER_TEMP/school-firebase-service-account.json"
          printf '%s' "$SCHOOL_FIREBASE_SERVICE_ACCOUNT_JSON_B64" | base64 --decode > "$service_account"
          chmod 600 "$service_account"
          python -m pip install --disable-pip-version-check --quiet google-auth requests
          python scripts/send_update_fcm.py \
            --service-account "$service_account" \
            --project-id "$SCHOOL_FIREBASE_PROJECT_ID" \
            --topic "$topic" \
            --version-code "$VERSION_CODE" \
            --version-name "$VERSION_NAME" \
            --manifest-url "https://github.com/MajorTomMan/school/releases/download/dev-latest/update-manifest.json"
