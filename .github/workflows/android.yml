name: Android CI/CD

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Test and assemble debug APK
        id: assemble
        shell: bash
        run: |
          set +e
          gradle :app:testDebugUnitTest :app:assembleDebug --stacktrace > build.log 2>&1
          status=$?
          tail -n 240 build.log
          exit $status

      - name: Prepare APK and checksum
        id: package
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          short_sha="${GITHUB_SHA::7}"

          if [ -z "$version_name" ]; then
            echo "Unable to read versionName from app/build.gradle.kts" >&2
            exit 1
          fi

          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/school-debug.apk
          sha256sum dist/school-debug.apk > dist/school-debug.apk.sha256

          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: build.log

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: school-debug-apk
          path: |
            dist/school-debug.apk
            dist/school-debug.apk.sha256

      - name: Publish rolling development release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ steps.package.outputs.version_name }}
          SHORT_SHA: ${{ steps.package.outputs.short_sha }}
        run: |
          set -euo pipefail

          tag="dev-latest"
          title="School ${VERSION_NAME} (${SHORT_SHA})"

          git fetch origin --tags --force
          previous_sha="$(git rev-list -n 1 "$tag" 2>/dev/null || true)"

          if [ -n "$previous_sha" ] && [ "$previous_sha" != "$GITHUB_SHA" ]; then
            diff_base="$previous_sha"
          else
            diff_base="$(git rev-parse "${GITHUB_SHA}^" 2>/dev/null || true)"
            if [ -z "$diff_base" ]; then
              diff_base="$(git hash-object -t tree /dev/null)"
            fi
          fi

          changelog="$(git log --no-merges --pretty=format:'- %s (`%h`)' "${diff_base}..${GITHUB_SHA}" || true)"
          if [ -z "$changelog" ]; then
            changelog="- $(git log -1 --pretty=%s "$GITHUB_SHA") (${SHORT_SHA})"
          fi

          files_changed="$(git diff --name-only "$diff_base" "$GITHUB_SHA" | sed '/^$/d' | wc -l | tr -d ' ')"
          read -r additions deletions < <(
            git diff --numstat "$diff_base" "$GITHUB_SHA" |
              awk '{ if ($1 ~ /^[0-9]+$/) add += $1; if ($2 ~ /^[0-9]+$/) del += $2 } END { print add + 0, del + 0 }'
          )

          if [ -n "$previous_sha" ] && [ "$previous_sha" != "$GITHUB_SHA" ]; then
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_sha}...${GITHUB_SHA}"
          else
            compare_url="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          fi

          cat > release-notes.md <<EOF
          ## 版本

          \`${VERSION_NAME}\` · [\`${SHORT_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})

          ## 修改内容

          ${changelog}

          ## 差异

          - [查看完整差异](${compare_url})
          - 修改 \`${files_changed}\` 个文件，新增 \`${additions}\` 行，删除 \`${deletions}\` 行
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag" --force

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$tag" \
              dist/school-debug.apk \
              dist/school-debug.apk.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$tag" \
              dist/school-debug.apk \
              dist/school-debug.apk.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes-file release-notes.md \
              --prerelease
          fi
