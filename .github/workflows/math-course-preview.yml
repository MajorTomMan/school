name: Mathematics Course Preview

on:
  pull_request:
    paths:
      - "app/**"
      - "tools/course-content/**"
      - ".github/workflows/math-course-preview.yml"

permissions:
  contents: read

concurrency:
  group: math-course-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture-previews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build preview APK
        env:
          SCHOOL_VERSION_CODE: 26
          SCHOOL_VERSION_NAME: 0.22.0
        run: gradle :app:assembleDebug --stacktrace

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run APK and capture course screens
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            set -euo pipefail
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell wm size 1080x2400
            adb shell wm density 420
            mkdir -p build/course-previews
            for preview in rational function geometry; do
              adb shell am force-stop com.majortomman.school
              adb shell am start -W \
                -n com.majortomman.school/.CoursePreviewActivity \
                --es preview "$preview"
              sleep 2
              adb exec-out screencap -p > "build/course-previews/${preview}.png"
            done

      - name: Upload course previews
        uses: actions/upload-artifact@v4
        with:
          name: mathematics-course-previews
          path: build/course-previews/*.png
          if-no-files-found: error
